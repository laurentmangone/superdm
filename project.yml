name: superdm
options:
  bundleIdPrefix: com.superdm
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_ENTITLEMENTS: ""

packages:
  ArgumentParser:
    url: https://github.com/apple/swift-argument-parser.git
    from: "1.2.0"
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift.git
    from: "0.14.1"

targets:
  superdm:
    type: application
    platform: macOS
    sources:
      - path: Sources/GUI
      - path: Sources/App
      - path: Sources/CLI
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.superdm.app
        PRODUCT_NAME: superdm
        INFOPLIST_FILE: Sources/GUI/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: "YES"
    dependencies:
      - package: ArgumentParser
        product: ArgumentParser
      - package: SQLite
        product: SQLite

schemes:
  superdm:
    build:
      targets:
        superdm: all
    run:
      config: Debug
